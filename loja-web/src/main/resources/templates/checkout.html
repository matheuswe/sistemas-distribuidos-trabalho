<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --focus: #3b82f6;
            --success: #10b981;
            --success-hover: #059669;
            --warning-bg: #fffbeb;
            --warning-text: #b45309;
            --warning-border: #fef3c7;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-primary); color: var(--text-main); max-width: 650px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 24px; }
        .card { background: var(--surface); border-radius: 16px; padding: 32px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .produto-info { background: #eff6ff; padding: 18px; border-radius: 12px; margin-bottom: 24px; border: 1px solid #dbeafe; font-size: 1.05rem; line-height: 1.6; }
        .info-dlq { background: var(--warning-bg); border: 1px solid var(--warning-border); color: var(--warning-text); padding: 14px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; color: #334155; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; background: #fafafa; transition: border-color 0.15s, box-shadow 0.15s; }
        input:focus { border-color: var(--focus); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); outline: none; background: #fff; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .cep-group { display: flex; gap: 10px; }
        .btn-cep { padding: 0 20px; background: #0f172a; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
        .btn-cep:hover { background: #1e293b; }
        .btn-submit { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.15s; }
        .btn-submit:hover { background: var(--success-hover); }
        a { color: #2563eb; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<h1>💳 Finalizar Compra</h1>
<div class="card">
    <div class="produto-info">
        <strong>📦 Produto:</strong> <span th:text="${produto.nome}">Produto</span><br>
        <strong>💰 Preço total:</strong> R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 2)}">0,00</span>
    </div>

    <form th:action="@{/finalizar}" method="post">
        <input type="hidden" name="produtoNome" th:value="${produto.nome}">
        <input type="hidden" name="produtoPreco" th:value="${produto.preco}">

        <div class="form-group">
            <label>Valor do pagamento (R$):</label>
            <input type="number" name="valor" th:value="${produto.preco}" step="0.01" required>
        </div>

        <div class="form-group">
            <label>CEP:</label>
            <div class="cep-group">
                <input type="text" id="cep" name="cep" placeholder="Ex: 85900000" maxlength="8">
                <button type="button" class="btn-cep" onclick="buscarCep()">Buscar</button>
            </div>
        </div>

        <div class="form-group">
            <label>Logradouro:</label>
            <input type="text" id="logradouro" name="logradouro" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Bairro:</label>
                <input type="text" id="bairro" name="bairro" required>
            </div>
            <div class="form-group">
                <label>Cidade:</label>
                <input type="text" id="cidade" name="cidade" required>
            </div>
        </div>

        <div class="form-group">
            <label>Estado:</label>
            <input type="text" id="estado" name="estado" maxlength="2" required>
        </div>

        <button type="submit" class="btn-submit">Confirmar Pagamento</button>
    </form>

    <p style="margin-top:24px; text-align: center;"><a href="/">← Voltar ao catálogo</a></p>
</div>

<script>
    function buscarCep() {
        const cep = document.getElementById('cep').value.replace(/\D/g, '');
        if (cep.length < 5) { alert('Informe ao menos 5 dígitos do CEP.'); return; }

        fetch('/cep/' + cep)
            .then(r => r.json())
            .then(data => {
                if (data) {
                    document.getElementById('logradouro').value = data.logradouro || '';
                    document.getElementById('bairro').value     = data.bairro     || '';
                    document.getElementById('cidade').value     = data.cidade     || '';
                    document.getElementById('estado').value     = data.estado     || '';
                } else {
                    alert('CEP não encontrado.');
                }
            })
            .catch(() => alert('Erro ao buscar CEP. Verifique se o cep-service está rodando.'));
    }
</script>
</body>
</html>
