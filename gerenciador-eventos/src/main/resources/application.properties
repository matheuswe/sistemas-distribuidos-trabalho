spring.application.name=gerenciador-eventos
server.port=8087

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# MongoDB - precisa estar rodando como Replica Set (mesmo que de 1 no) para suportar Change Streams
spring.data.mongodb.uri=mongodb://localhost:27017/ecommerce?replicaSet=rs0

# Nome da collection observada via Change Stream (onde a Loja Web Legado grava os pedidos)
mongo.collection.pedidos=pedidos
